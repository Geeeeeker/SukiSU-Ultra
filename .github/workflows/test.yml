name: Test KernelSU for 4.14

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      KBUILD_BUILD_USER: NATO66613
      KBUILD_BUILD_HOST: KREMLIN

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Integrate SukiSU-Ultra
        run: |
          git clone --depth=1 https://github.com/Geeeeeker/SukiSU-Ultra.git
          mkdir -p drivers/kernelsu
          cp -r SukiSU-Ultra/kernel/* drivers/kernelsu/
          cp -r SukiSU-Ultra/uapi drivers/kernelsu/
          echo "obj-\$(CONFIG_KSU) += kernelsu/" >> drivers/Makefile
          echo 'source "drivers/kernelsu/Kconfig"' >> drivers/Kconfig
          # 符号链接（解决 kpm 头文件）
          mkdir -p drivers/kernelsu/kpm
          for dir in policy uapi include manager sulog supercall; do
            [ -d "drivers/kernelsu/$dir" ] && ln -sf "../$dir" "drivers/kernelsu/kpm/$dir"
          done

      - name: Setup ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          create-symlink: true
          key: kernel-build-cache
          max-size: '5G'

      - name: Restore toolchain cache
        id: restore-clang
        uses: actions/cache/restore@v4
        with:
          path: /home/runner/r547379
          key: clang-r547379

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex libelf-dev libncurses-dev libssl-dev unzip zip wget

      - name: Deploy Clang
        if: steps.restore-clang.outputs.cache-hit != 'true'
        run: |
          git clone --depth=1 https://gitlab.com/crdroidandroid/android_prebuilts_clang_host_linux-x86_clang-r547379.git /home/runner/r547379

      - name: Save clang
        if: steps.restore-clang.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: /home/runner/r547379
          key: clang-r547379

      - name: Configure kernel (enable KSU using default config)
        run: |
          export CLANG_PATH=$HOME/r547379/bin
          export PATH=${CLANG_PATH}:${PATH}
          # 使用架构默认配置
          make ARCH=arm64 LLVM=1 LLVM_IAS=1 defconfig O=out
          # 启用 KernelSU 和相关选项
          cat >> out/.config << 'EOF'
CONFIG_KSU=y
CONFIG_KPM=y
CONFIG_KPROBES=y
CONFIG_HAVE_KPROBES=y
CONFIG_KPROBE_EVENTS=y
CONFIG_DEBUG_KERNEL=y
CONFIG_KALLSYMS=y
CONFIG_KALLSYMS_ALL=y
CONFIG_IKCONFIG=y
CONFIG_IKCONFIG_PROC=y
# CONFIG_TRACING is not set
# CONFIG_FTRACE is not set
EOF
          # 解决依赖（自动处理）
          make ARCH=arm64 LLVM=1 LLVM_IAS=1 olddefconfig O=out

      - name: Patch KernelSU for 4.14 compatibility
        run: |
          # 1. 删除 MODULE_IMPORT_NS
          find drivers/kernelsu -name "*.c" -exec sed -i '/MODULE_IMPORT_NS/d' {} \;
          
          # 2. 修复 syscall_fn_t
          sed -i 's/typedef void (\*syscall_fn_t)(void);/typedef long (*syscall_fn_t)(struct pt_regs *);/' drivers/kernelsu/hook/syscall_hook.h 2>/dev/null || true
          grep -q "typedef long (*syscall_fn_t)(struct pt_regs \*);" drivers/kernelsu/hook/syscall_hook.h || \
            sed -i '1i typedef long (*syscall_fn_t)(struct pt_regs *);' drivers/kernelsu/hook/syscall_hook.h
          
          # 3. access_ok 三参数
          find drivers/kernelsu -name "*.c" -exec sed -i 's/access_ok(/access_ok(VERIFY_READ, /g' {} \;
          
          # 4. pgtable.h 替换
          find drivers/kernelsu -name "*.c" -exec sed -i 's/#include <linux\/pgtable.h>/#include <asm\/pgtable.h>/g' {} \;
          
          # 5. 添加缺失头文件
          find drivers/kernelsu -name "*.c" -exec grep -l "pgtable" {} \; | while read f; do
            grep -q "#include <linux/mm.h>" "$f" || sed -i '1i #include <linux/mm.h>' "$f"
          done
          find drivers/kernelsu -name "*.c" -exec grep -l -E "VERIFY_READ|strncpy_from_user" {} \; | while read f; do
            grep -q "#include <linux/uaccess.h>" "$f" || sed -i '1i #include <linux/uaccess.h>' "$f"
          done
          
          # 6. 修复 sucompat.c const
          sed -i 's/ksu_syscall_table\[orig_nr\](regs)/ksu_syscall_table[orig_nr]((struct pt_regs *)regs)/g' drivers/kernelsu/feature/sucompat.c
          
          # 7. 注释 __NR_clone3
          sed -i 's#ksu_register_syscall_hook(__NR_clone3, ksu_hook_clone);#// ksu_register_syscall_hook(__NR_clone3, ksu_hook_clone);#g' drivers/kernelsu/hook/syscall_hook_manager.c
          sed -i 's#ksu_unregister_syscall_hook(__NR_clone3);#// ksu_unregister_syscall_hook(__NR_clone3);#g' drivers/kernelsu/hook/syscall_hook_manager.c
          
          # 8. 修复 patch_memory.c
          PATCH_MEM="drivers/kernelsu/hook/arm64/patch_memory.c"
          if [ -f "$PATCH_MEM" ]; then
            sed -i 's/__pte_to_phys(\*pte)/(pte_pfn(*pte) << PAGE_SHIFT)/g' "$PATCH_MEM"
            sed -i 's/ret = (int)copy_to_kernel_nofault(map, src, len);/ret = probe_kernel_write(map, src, len); if (ret) ret = -EFAULT;/g' "$PATCH_MEM"
            sed -i 's/__flush_icache_range/flush_icache_range/g' "$PATCH_MEM"
            sed -i 's/#define ksu_flush_icache(start, end) __flush_icache_range/#define ksu_flush_icache(start, end) flush_icache_range/g' "$PATCH_MEM"
          fi
          
          # 9. 修复 event_queue __poll_t
          for f in drivers/kernelsu/infra/event_queue.h drivers/kernelsu/infra/event_queue.c; do
            [ -f "$f" ] && sed -i 's/__poll_t/unsigned int/g' "$f"
            [ -f "$f" ] && grep -q "#include <linux/poll.h>" "$f" || sed -i '1i #include <linux/poll.h>' "$f"
          done

      - name: Replace Kbuild (only compatible files for 4.14)
        run: |
          cat > drivers/kernelsu/Kbuild << 'EOF'
ccflags-y += -I$(srctree)/drivers/kernelsu

obj-$(CONFIG_KSU) += kernelsu.o

kernelsu-objs := core/init.o
kernelsu-objs += feature/kernel_umount.o
kernelsu-objs += feature/sulog.o
kernelsu-objs += feature/sucompat.o
kernelsu-objs += feature/adb_root.o

kernelsu-objs += hook/lsm_hook.o
kernelsu-objs += hook/setuid_hook.o
kernelsu-objs += hook/syscall_event_bridge.o
kernelsu-objs += hook/syscall_hook_manager.o
kernelsu-objs += hook/tp_marker.o
ifeq ($(CONFIG_ARM64),y)
kernelsu-objs += hook/arm64/patch_memory.o
kernelsu-objs += hook/arm64/syscall_hook.o
else ifeq ($(CONFIG_X86_64),y)
kernelsu-objs += hook/x86_64/patch_memory.o
kernelsu-objs += hook/x86_64/syscall_hook.o
endif

kernelsu-objs += infra/event_queue.o
kernelsu-objs += infra/symbol_resolver.o

kernelsu-objs += selinux/selinux.o
kernelsu-objs += selinux/rules.o
kernelsu-objs += selinux/sepolicy.o

kernelsu-objs += sulog/event.o
kernelsu-objs += sulog/fd.o

kernelsu-objs += supercall/dispatch.o
kernelsu-objs += supercall/perm.o
kernelsu-objs += supercall/supercall.o

ifeq ($(CONFIG_KPM), y)
obj-$(CONFIG_KPM) += kpm/
endif

ifdef KBUILD_EXTMOD
ifeq ($(CONFIG_KSU_DISABLE_MANAGER),y)
ccflags-y += -DCONFIG_KSU_DISABLE_MANAGER=1
endif
ifeq ($(CONFIG_KSU_DISABLE_POLICY),y)
ccflags-y += -DCONFIG_KSU_DISABLE_POLICY=1
endif
ifeq ($(CONFIG_KSU_DEBUG),y)
ccflags-y += -DCONFIG_KSU_DEBUG=1
endif
endif

ifeq ($(CONFIG_KSU_MANUAL_SU), y)
ccflags-y += -DCONFIG_KSU_MANUAL_SU
kernelsu-objs += other/manual_su.o
endif

ccflags-y += -I$(srctree)/security/selinux -I$(srctree)/security/selinux/include
ccflags-y += -I$(objtree)/security/selinux -include $(srctree)/include/uapi/asm-generic/errno.h

ifeq ($(filter /%,$(src)),)
KSU_KERNEL_DIR := $(srctree)/$(src)
else
KSU_KERNEL_DIR := $(src)
endif

ccflags-y += -I$(KSU_KERNEL_DIR) -I$(KSU_KERNEL_DIR)/include

MDIR := $(dir $(abspath $(lastword $(MAKEFILE_LIST))))

GIT := $(shell PATH="$$PATH":/usr/bin:/usr/local/bin which git)
ifneq ($(GIT),)
GIT_ROOT := $(shell cd $(MDIR) && $(GIT) rev-parse --show-toplevel 2>/dev/null)
ifneq ($(GIT_ROOT),)
KERNEL_GIT_ROOT := $(shell cd $(srctree) && $(GIT) rev-parse --show-toplevel 2>/dev/null)
ifneq ($(GIT_ROOT),$(KERNEL_GIT_ROOT))
$(shell cd $(GIT_ROOT) && [ -f .git/shallow ] && $(GIT) fetch --unshallow 2>/dev/null || true)
KSU_GIT_VERSION := $(shell cd $(GIT_ROOT) && $(GIT) rev-list --count HEAD 2>/dev/null)
KSU_GIT_VERSION_VALID := 1
$(info -- KernelSU: Git repo detected at $(GIT_ROOT))
endif
endif
else
$(warning -- KernelSU: Git not detected, make sure git is installed in your PATH!)
endif

ifdef KSU_GIT_VERSION_VALID
$(eval KSU_VERSION=$(shell expr 30000 + $(KSU_GIT_VERSION)))
$(info -- KernelSU version: $(KSU_VERSION))
ccflags-y += -DKSU_VERSION=$(KSU_VERSION)
else
$(warning "KSU_GIT_VERSION not defined! It is better to make KernelSU a git repository!")
ccflags-y += -DKSU_VERSION=16
endif

KSU_NEW_DCACHE_FLUSH := $(shell grep -q __flush_dcache_area $(srctree)/arch/arm64/include/asm/cacheflush.h ; echo $$?)
$(info -- KSU_NEW_DCACHE_FLUSH: $(KSU_NEW_DCACHE_FLUSH))

ifndef KSU_EXPECTED_SIZE
KSU_EXPECTED_SIZE := 0x033b
endif
ifndef KSU_EXPECTED_HASH
KSU_EXPECTED_HASH := c371061b19d8c7d7d6133c6a9bafe198fa944e50c1b31c9d8daa8d7f1fc2d2d6
endif
ifdef KSU_MANAGER_PACKAGE
ccflags-y += -DKSU_MANAGER_PACKAGE=\"$(KSU_MANAGER_PACKAGE)\"
$(info -- KernelSU Manager package name: $(KSU_MANAGER_PACKAGE))
endif
$(info -- KernelSU Manager signature size: $(KSU_EXPECTED_SIZE))
$(info -- KernelSU Manager signature hash: $(KSU_EXPECTED_HASH))
ccflags-y += -DEXPECTED_SIZE=$(KSU_EXPECTED_SIZE)
ccflags-y += -DEXPECTED_HASH=\"$(KSU_EXPECTED_HASH)\"

ifdef KSU_EXPECTED_SIZE2
ifndef KSU_EXPECTED_HASH2
$(error KSU_EXPECTED_HASH2 must be set when KSU_EXPECTED_SIZE2 is set)
endif
ccflags-y += -DEXPECTED_SIZE2=$(KSU_EXPECTED_SIZE2)
ccflags-y += -DEXPECTED_HASH2=\"$(KSU_EXPECTED_HASH2)\"
$(info -- KernelSU Manager signature size2: $(KSU_EXPECTED_SIZE2))
$(info -- KernelSU Manager signature hash2: $(KSU_EXPECTED_HASH2))
endif

ccflags-y += -DKSU_NEW_DCACHE_FLUSH=$(KSU_NEW_DCACHE_FLUSH)

ccflags-y += -Wno-strict-prototypes -Wno-int-conversion -Wno-gcc-compat -Wno-missing-prototypes
ccflags-y += -Wno-declaration-after-statement -Wno-unused-function
EOF
          # 清空不兼容的源文件
          for f in infra/file_wrapper.c infra/seccomp_cache.c infra/su_mount_ns.c \
                    manager/pkg_observer.c manager/throne_tracker.c manager/apk_sign.c \
                    policy/allowlist.c policy/app_profile.c policy/feature.c \
                    runtime/boot_event.c runtime/ksud_integration.c; do
            [ -f "drivers/kernelsu/$f" ] && : > "drivers/kernelsu/$f"
          done

      - name: Build kernel
        run: |
          export CLANG_PATH=$HOME/r547379/bin
          export PATH=${CLANG_PATH}:${PATH}
          make ARCH=arm64 LLVM=1 LLVM_IAS=1 CC="ccache clang" -j$(nproc) O=out
          ccache --show-stats

      - name: Package AnyKernel3
        run: |
          git clone --depth=1 https://github.com/SOVIET-ANDROID/AnyKernel3.git $HOME/AnyKernel3
          cp out/arch/arm64/boot/Image.gz-dtb $HOME/AnyKernel3/ 2>/dev/null || echo "Image not found"
          cp out/arch/arm64/boot/dtbo.img $HOME/AnyKernel3/ 2>/dev/null || echo "dtbo not found"
          curl -L -o $HOME/AnyKernel3/SukiSU-Manager.apk https://github.com/Geeeeeker/SukiSU-Ultra/releases/latest/download/SukiSU-Manager.apk || echo "APK download skipped"
          cat > $HOME/AnyKernel3/anykernel.sh << 'EOF'
#!/sbin/sh
kernel.string=KernelSU (4.14 Test)
do.devicecheck=1
do.modules=0
do.systemless=1
do.cleanup=1
device.name1=raphael

ui_print " - Flashing kernel"
block=/dev/block/by-name/boot
is_slot_device=1
ramdisk_compression=auto
. /tmp/anykernel/tools/ak2-core.sh
ui_print " - Done"
EOF
          chmod +x $HOME/AnyKernel3/anykernel.sh
          cd $HOME/AnyKernel3
          zip -r9 $GITHUB_WORKSPACE/kernelsu-test.zip . -x "*.git*"
          cd $GITHUB_WORKSPACE

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kernelsu-4.14-test
          path: kernelsu-test.zip
